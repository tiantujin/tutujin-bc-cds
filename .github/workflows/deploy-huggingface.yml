name: Deploy to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "Missing HF_TOKEN repository secret"
            exit 1
          fi
          python - <<'PY'
          from pathlib import Path
          import base64

          html = Path("backend/app/static/index.html")
          text = html.read_text(encoding="utf-8")
          data = base64.b64encode(Path("backend/app/static/assets/tutujin-logo.png").read_bytes()).decode("ascii")
          text = text.replace(
              'src="/app/assets/tutujin-logo.png"',
              f'src="data:image/png;base64,{data}"',
          )
          html.write_text(text, encoding="utf-8")
          Path("backend/app/static/assets/tutujin-logo.png").unlink(missing_ok=True)
          PY
          rm -rf .git
          git init
          git checkout -b main
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Deploy app to Hugging Face Space"
          git remote add hf "https://Tiantujin:${HF_TOKEN}@huggingface.co/spaces/Tiantujin/tutujin-bc-cds"
          git push hf main --force
